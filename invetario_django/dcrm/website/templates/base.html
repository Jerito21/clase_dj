{% load static %}
<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Sistema de gestión de inventario con control de roles, CRUD completo y reportes exportables en PDF y CSV.">
    <meta name="author" content="Equipo DCRM">
    <meta name="keywords" content="inventario, django, gestión, productos, stock, administración">
    <meta name="robots" content="noindex, nofollow">
    <title>Sistema de Inventario DCRM</title>
    <!-- Bootstrap 5 — Instalado LOCALMENTE (sin CDN externo) -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <!-- Estilos personalizados del sistema -->
    <link href="{% static 'css/custom.css' %}" rel="stylesheet">
    <!-- Google Fonts: Inter — tipografía premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    {% include 'navbar.html' %}

    <main>
      {% block content %}
      {% endblock %}
    </main>

    <!-- Bootstrap Bundle JS — Instalado LOCALMENTE (incluye Popper para modales) -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  </body>
</html>
